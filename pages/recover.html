<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Recuperar contraseña — A1AN | Safe&amp;Sound Robotics</title>
  <link rel="icon" href="/assets/logo.png" type="image/png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/styles.css">
  <link rel="stylesheet" href="/css/auth.css">
  <link rel="stylesheet" href="/css/responsive.css">
</head>
<body>

  <div class="auth-page">
    <div class="auth-card">
      <a href="/" class="auth-logo">
        <img src="/assets/logo.png" alt="Safe&amp;Sound Robotics">
        <span>Safe&amp;Sound</span>
      </a>

      <div class="auth-header">
        <h1>Recuperar contraseña</h1>
        <p>Introduce tu correo electrónico y te enviaremos un enlace para restablecer tu contraseña</p>
      </div>

      <div class="auth-message" id="authMessage"></div>

      <!-- PASO 1: Pedir email -->
      <div id="recoverStep1">
        <form class="auth-form" id="recoverForm">
          <div class="form-group">
            <label for="email">Correo electrónico</label>
            <input type="email" id="email" placeholder="tu@email.com" required>
            <span class="form-error" id="emailError">Introduce un correo electrónico válido</span>
          </div>

          <button type="submit" class="btn btn-primary btn-lg">Enviar enlace de recuperación</button>
        </form>
      </div>

      <!-- PASO 2: Nueva contraseña (visible cuando el usuario llega desde el email) -->
      <div id="recoverStep2" style="display:none;">
        <form class="auth-form" id="resetForm">
          <div class="form-group">
            <label for="newPassword">Nueva contraseña</label>
            <div class="password-toggle">
              <input type="password" id="newPassword" placeholder="Mínimo 6 caracteres" required>
              <button type="button" class="toggle-password" aria-label="Mostrar contraseña">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
              </button>
            </div>
            <span class="form-error" id="newPasswordError">La contraseña debe tener al menos 6 caracteres</span>
          </div>

          <div class="form-group">
            <label for="confirmNewPassword">Confirmar contraseña</label>
            <div class="password-toggle">
              <input type="password" id="confirmNewPassword" placeholder="Repite la contraseña" required>
              <button type="button" class="toggle-password" aria-label="Mostrar contraseña">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
              </button>
            </div>
            <span class="form-error" id="confirmNewPasswordError">Las contraseñas no coinciden</span>
          </div>

          <button type="submit" class="btn btn-primary btn-lg">Guardar nueva contraseña</button>
        </form>
      </div>

      <div class="auth-footer">
        <p>¿Recordaste tu contraseña? <a href="/pages/login.html">Iniciar sesión</a></p>
      </div>
    </div>
  </div>

  <div class="toast" id="toast"></div>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="/js/supabase-client.js"></script>
  <script src="/js/auth.js"></script>
</body>
</html>
